global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node'
    # node_exporter listens on 127.0.0.1:9100 on the host.
    # host.docker.internal resolves to the host gateway from within Docker (Linux, requires extra_hosts in compose).
    # UFW must block port 9100 from the internet: sudo ufw deny 9100
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Uncomment this job after adding prom-client to your Node.js app
  # See monitoring/README.md for instructions
  # - job_name: 'app'
  #   static_configs:
  #     - targets: ['app:3000']
  #   metrics_path: '/metrics'
