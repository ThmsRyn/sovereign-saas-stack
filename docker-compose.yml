name: sovereign-saas

services:
  app:
    build: ./docker/app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://appuser:${DB_PASSWORD}@postgres:5432/appdb
    networks:
      - app_network
      - internal
    depends_on:
      - postgres
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
      - POSTGRES_DB=appdb
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    networks:
      - app_network
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - app_network

  grafana:
    image: grafana/grafana:12.4.2
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app_network
    depends_on:
      - prometheus

  diun:
    image: crazymax/diun:4.28.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - diun_data:/data
    environment:
      - LOG_LEVEL=info
      - LOG_JSON=false
      - DIUN_WATCH_WORKERS=20
      - DIUN_WATCH_SCHEDULE=0 0 4 * * *
      - DIUN_PROVIDERS_DOCKER=true
    networks:
      - app_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.56.2
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://monitoring:${MONITORING_PASSWORD}@postgres:5432/postgres?sslmode=disable
    networks:
      - app_network
      - internal
    depends_on:
      - postgres

  openbao:
    image: quay.io/openbao/openbao:v2.5.0
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    volumes:
      - openbao_data:/openbao/data
      - ./openbao/config.hcl:/openbao/config/config.hcl:ro
    command: ["bao", "server", "-config=/openbao/config/config.hcl"]
    networks:
      - internal

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  diun_data:
  openbao_data:

networks:
  internal:
    driver: bridge
    internal: true
  app_network:
    driver: bridge
