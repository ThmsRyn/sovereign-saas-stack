# ModSecurity override configuration
# This file is loaded after the default ModSecurity config

# Set to DetectionOnly to log without blocking (recommended while tuning).
# Switch to On only after reviewing logs for false positives.
SecRuleEngine DetectionOnly

# Increase request body limit if needed (default 13kb)
# SecRequestBodyLimit 1048576

# Example: whitelist a specific rule for a specific path
# SecRuleUpdateTargetById 942100 "!REQUEST_URI:/api/admin/import"

# Example: disable a rule entirely if it causes false positives
# SecRuleRemoveById 920350
